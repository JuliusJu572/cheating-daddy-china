<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>录音管理</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="container">
    <div id="nav-container"></div>
    <div class="card">
        <h1>录音管理</h1>
        <input id="voice-file" type="file" accept=".wav,.mp3,.webm,.m4a" />
        <div class="row">
            <input id="voice-source" placeholder="来源（mic/system）" value="mic" />
            <input id="voice-duration" type="number" placeholder="时长秒数（可选）" value="0" />
        </div>
        <button id="upload-btn" class="primary">上传录音</button>
        <div id="status"></div>
    </div>
    <div class="card">
        <h2>录音列表</h2>
        <div id="voice-list"></div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
    (function () {
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('voice-list');

        function setStatus(msg, type) {
            statusEl.className = msg ? `status ${type || 'success'}` : '';
            statusEl.textContent = msg || '';
        }

        async function loadVoices() {
            const data = await WebApi.apiRequest('/api/voice/list');
            const rows = data.voices || [];
            listEl.innerHTML = rows.length
                ? rows
                    .map(v => `
                        <div class="list-item">
                            <div>
                                <div>${v.original_filename || '录音文件'}</div>
                                <div class="small">来源: ${v.source || '-'}，时长: ${v.duration_sec || 0}s，${new Date(v.created_at).toLocaleString()}</div>
                                <audio controls src="/api/voice/${v.id}/file" style="margin-top:6px;width:260px;"></audio>
                            </div>
                            <button class="danger" data-id="${v.id}">删除</button>
                        </div>
                    `)
                    .join('')
                : '<div class="small">暂无录音</div>';
            listEl.querySelectorAll('button[data-id]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    try {
                        await WebApi.apiRequest(`/api/voice/${btn.dataset.id}`, { method: 'DELETE' });
                        await loadVoices();
                    } catch (err) {
                        setStatus(err.message, 'error');
                    }
                });
            });
        }

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const file = document.getElementById('voice-file').files?.[0];
            if (!file) {
                setStatus('请选择录音文件', 'error');
                return;
            }
            const source = (document.getElementById('voice-source').value || 'mic').trim();
            const durationSec = parseInt(document.getElementById('voice-duration').value || '0', 10) || 0;
            const form = new FormData();
            form.append('voice', file);
            form.append('source', source);
            form.append('durationSec', String(durationSec));
            try {
                setStatus('上传中...');
                await WebApi.apiRequest('/api/voice/upload', { method: 'POST', body: form });
                setStatus('上传成功', 'success');
                await loadVoices();
            } catch (err) {
                setStatus(err.message, 'error');
            }
        });

        WebApi.ensureLoggedIn().then(user => {
            if (!user) return;
            WebApi.renderNav(user);
            loadVoices().catch(err => setStatus(err.message, 'error'));
        });
    })();
</script>
</body>
</html>
