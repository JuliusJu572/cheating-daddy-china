<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简历管理</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .usage-info {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .usage-info strong { color: var(--text-primary); }
        .section-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .section-legend span {
            background: rgba(255,255,255,0.06);
            padding: 4px 8px;
            border-radius: 4px;
        }
        #edit-content {
            width: 100%;
            min-height: 360px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="nav-container"></div>
    <div class="card">
        <h1>简历管理</h1>
        <div class="usage-info" style="margin-bottom:0;">
            <strong>简历已迁移至本地</strong><br>
            简历上传功能已迁移至「作弊老铁」<strong>桌面应用</strong>。请在桌面应用中打开 <strong>设置 → 简历管理</strong> 上传和解析简历。解析在本地完成，内容仅保存在本机，不会上传到服务器。
        </div>
    </div>
    <div class="card">
        <h2>历史简历（仅供参考）</h2>
        <div class="muted" style="margin-bottom:12px;">以下为迁移前上传的简历，已不再用于 AI 上下文注入。请使用桌面应用管理简历。</div>
        <div id="status"></div>
        <div id="resume-list"></div>
    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
        <div class="modal-header">
            <h2>编辑解析内容</h2>
            <button class="danger" id="close-modal" style="padding:4px 8px;font-size:12px;">关闭</button>
        </div>
        <div class="modal-body">
            <div class="usage-info">
                <strong>用途说明</strong><br>
                以下内容会作为「用户提供的上下文」注入到<strong>面试 AI</strong>的系统提示中，用于面试辅导、模拟面试等场景。面试 AI 会根据这些信息了解你的背景，从而给出更贴合你简历的回答建议。
            </div>
            <div class="section-legend">
                <span>【候选人定位】</span>
                <span>【核心技能】</span>
                <span>【工作经历亮点】</span>
                <span>【项目亮点】</span>
                <span>【教育背景】</span>
                <span>【可展开提问点】</span>
            </div>
            <label for="edit-content">解析内容（可编辑）</label>
            <textarea id="edit-content" placeholder="建议按上述小节组织内容，便于面试 AI 理解..."></textarea>
        </div>
        <div class="modal-footer">
            <button id="save-content-btn" class="primary">保存修改</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    (function () {
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('resume-list');
        const modalEl = document.getElementById('edit-modal');
        const editContentEl = document.getElementById('edit-content');
        let currentEditingId = null;

        function setStatus(msg, type) {
            statusEl.className = msg ? `status ${type || 'success'}` : '';
            statusEl.textContent = msg || '';
        }

        async function loadResumes() {
            const data = await WebApi.apiRequest('/api/resume/list');
            const rows = data.resumes || [];
            listEl.innerHTML = rows.length
                ? rows
                    .map(r => `
                        <div class="list-item">
                            <div>
                                <div>${r.original_filename || '简历'}</div>
                                <div class="small">${new Date(r.created_at).toLocaleString()}</div>
                            </div>
                            <div style="display:flex;gap:8px;">
                                <button data-action="edit" data-id="${r.id}">编辑解析内容</button>
                                <button class="danger" data-action="delete" data-id="${r.id}">删除</button>
                            </div>
                        </div>
                    `)
                    .join('')
                : '<div class="small">暂无简历</div>';
            
            listEl.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('确定要删除这份简历吗？')) return;
                    try {
                        await WebApi.apiRequest(`/api/resume/item/${btn.dataset.id}`, { method: 'DELETE' });
                        await loadResumes();
                    } catch (err) {
                        setStatus(err.message, 'error');
                    }
                });
            });

            listEl.querySelectorAll('button[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.id));
            });
        }

        async function openEditModal(id) {
            currentEditingId = id;
            try {
                const data = await WebApi.apiRequest(`/api/resume/item/${id}`);
                editContentEl.value = data.resume.analyzed_content || '';
                modalEl.style.display = 'flex';
            } catch (err) {
                setStatus(err.message || '加载失败，该简历可能已被删除', 'error');
                await loadResumes();
            }
        }

        function closeEditModal() {
            modalEl.style.display = 'none';
            currentEditingId = null;
            editContentEl.value = '';
        }

        document.getElementById('close-modal').addEventListener('click', closeEditModal);
        
        document.getElementById('save-content-btn').addEventListener('click', async () => {
            if (!currentEditingId) return;
            const content = editContentEl.value;
            try {
                await WebApi.apiRequest(`/api/resume/item/${currentEditingId}`, {
                    method: 'PUT',
                    body: { analyzedContent: content }
                });
                closeEditModal();
                setStatus('解析内容已更新', 'success');
            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        });

        WebApi.ensureLoggedIn().then(user => {
            if (!user) return;
            WebApi.renderNav(user);
            loadResumes().catch(err => setStatus(err.message, 'error'));
        });
    })();
</script>
</body>
</html>
